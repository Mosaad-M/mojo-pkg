name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone tls
        run: |
          git clone https://github.com/Mosaad-M/tls.git ../tls_pure
          git -C ../tls_pure checkout 9514e4684e4455c62bb243a22159656453a55b82

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4

      - name: Run all tests
        run: pixi run test

  build-and-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone tls
        run: |
          git clone https://github.com/Mosaad-M/tls.git ../tls_pure
          git -C ../tls_pure checkout 9514e4684e4455c62bb243a22159656453a55b82

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4

      - name: Build binary
        run: pixi run build

      - name: Smoke test
        run: |
          ~/.mojo/bin/mojo-pkg version | grep -q "mojo-pkg"
          ~/.mojo/bin/mojo-pkg help 2>&1 | grep -q "install"
          echo "PASS: binary smoke tests"

  test-macos:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone tls
        run: |
          git clone https://github.com/Mosaad-M/tls.git ../tls_pure
          git -C ../tls_pure checkout 9514e4684e4455c62bb243a22159656453a55b82

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4

      - name: Run all tests
        run: pixi run test

  build-and-smoke-macos:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone tls
        run: |
          git clone https://github.com/Mosaad-M/tls.git ../tls_pure
          git -C ../tls_pure checkout 9514e4684e4455c62bb243a22159656453a55b82

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4

      - name: Build binary
        run: pixi run build

      - name: Smoke test
        run: |
          ~/.mojo/bin/mojo-pkg version | grep -q "mojo-pkg"
          ~/.mojo/bin/mojo-pkg help 2>&1 | grep -q "install"
          echo "PASS: binary smoke tests"
