name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone tls
        run: git clone --depth 1 https://github.com/Mosaad-M/tls.git ../tls_pure

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Run all tests
        run: pixi run test

  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone tls
        run: git clone --depth 1 https://github.com/Mosaad-M/tls.git ../tls_pure

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Build binary
        run: pixi run build

      - name: Smoke test
        run: |
          ~/.mojo/bin/mojo-pkg version | grep -q "mojo-pkg"
          ~/.mojo/bin/mojo-pkg help 2>&1 | grep -q "install"
          echo "PASS: binary smoke tests"
