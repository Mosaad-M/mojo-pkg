name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone tls
        run: |
          git clone https://github.com/Mosaad-M/tls.git ../tls_pure
          git -C ../tls_pure checkout bcab9378ed789c1f657f6e42702878306336673f

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4

      - name: Run all tests
        run: pixi run test

  build-and-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone tls
        run: |
          git clone https://github.com/Mosaad-M/tls.git ../tls_pure
          git -C ../tls_pure checkout bcab9378ed789c1f657f6e42702878306336673f

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4

      - name: Build binary
        run: pixi run build

      - name: Smoke test
        run: |
          ~/.mojo/bin/mojo-pkg version | grep -q "mojo-pkg"
          ~/.mojo/bin/mojo-pkg help 2>&1 | grep -q "install"
          echo "PASS: binary smoke tests"

  release:
    needs: [test, build-and-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone tls
        run: |
          git clone https://github.com/Mosaad-M/tls.git ../tls_pure
          git -C ../tls_pure checkout bcab9378ed789c1f657f6e42702878306336673f

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4

      - name: Build binary
        run: pixi run build
        # Produces ~/.mojo/bin/mojo-pkg-bin (binary) and ~/.mojo/bin/mojo-pkg (wrapper)

      - name: Package binary
        run: tar czf mojo-pkg-linux-64.tar.gz -C "$HOME/.mojo/bin" mojo-pkg-bin mojo-pkg

      - name: Generate SHA256
        run: sha256sum mojo-pkg-linux-64.tar.gz > mojo-pkg-linux-64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1 (latest; node20 — update when node24 version released)
        with:
          files: |
            mojo-pkg-linux-64.tar.gz
            mojo-pkg-linux-64.tar.gz.sha256
