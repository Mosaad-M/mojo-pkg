name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone tls
        run: git clone --depth 1 https://github.com/Mosaad-M/tls.git ../tls

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Build binary
        run: pixi run build
        # Produces ~/.mojo/bin/mojo-pkg

      - name: Package binary
        run: tar czf mojo-pkg-linux-64.tar.gz -C "$HOME/.mojo/bin" mojo-pkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mojo-pkg-linux-64.tar.gz
